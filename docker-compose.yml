services:
  mysql:
    image: mysql:8.0
    container_name: schedule_mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_HOST: '%'
    command: ["--default-authentication-plugin=mysql_native_password"]
    restart: always
    networks:
      - app_network
    ports:
      - ${DB_PORT}:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$DB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schedule_nextjs
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    restart: always
    networks:
      - app_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: schedule_nginx
    depends_on:
      nextjs:
        condition: service_healthy
    ports:
      - "80:80"
    restart: always
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
